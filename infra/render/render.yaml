services:
  - type: web
    name: seotracker-api
    env: node
    plan: starter
    rootDir: .
    buildCommand: pnpm install && pnpm --filter api build
    startCommand: pnpm --filter api start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 4000
  - type: worker
    name: seotracker-jobs
    env: node
    plan: starter
    rootDir: .
    buildCommand: pnpm install && pnpm --filter jobs build
    startCommand: pnpm --filter jobs start
    envVars:
      - key: NODE_VERSION
        value: 22
  - type: worker
    name: seotracker-scheduler
    env: node
    plan: starter
    rootDir: .
    buildCommand: pnpm install && pnpm --filter scheduler build
    startCommand: pnpm --filter scheduler start
    envVars:
      - key: NODE_VERSION
        value: 22
  - type: web
    name: seotracker-web
    env: node
    plan: starter
    rootDir: .
    buildCommand: pnpm install && pnpm --filter web build
    startCommand: pnpm --filter web start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 3000
