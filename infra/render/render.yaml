services:
  - type: web
    name: seotracker-api
    env: node
    plan: starter
    rootDir: .
    buildCommand: pnpm install && pnpm --filter api build
    startCommand: pnpm --filter api start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 4000
  - type: worker
    name: seotracker-worker
    env: node
    plan: starter
    rootDir: .
    buildCommand: pnpm install && pnpm --filter worker build
    startCommand: pnpm --filter worker start
    envVars:
      - key: NODE_VERSION
        value: 22
  - type: web
    name: seotracker-web
    env: node
    plan: starter
    rootDir: .
    buildCommand: pnpm install && pnpm --filter web build
    startCommand: pnpm --filter web start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 3000
