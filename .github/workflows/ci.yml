name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  APP_URL: http://localhost:3000
  COOKIE_DOMAIN: localhost
  COOKIE_SECURE: 'false'
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/seotracker_test
  JWT_ACCESS_SECRET: ci-access-secret-value-that-is-long-enough-for-tests
  JWT_REFRESH_SECRET: ci-refresh-secret-value-that-is-long-enough-for-tests
  NODE_ENV: test
  REDIS_URL: redis://localhost:6379
  SMTP_HOST: localhost
  SMTP_PORT: '1025'
  SMTP_SECURE: 'false'
  TRUST_PROXY: '1'

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-node-pnpm

      - name: Check formatting
        run: pnpm ci:format

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-node-pnpm

      - name: Run lint
        run: pnpm ci:lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-node-pnpm

      - name: Check types
        run: pnpm ci:typecheck

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-node-pnpm

      - name: Run unit tests
        run: pnpm ci:test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-node-pnpm

      - name: Build packages and apps
        run: pnpm ci:build

  api-e2e:
    name: API e2e
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.3-alpine3.23
        env:
          POSTGRES_DB: seotracker_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d seotracker_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:8.6.2-alpine3.23
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup workspace
        uses: ./.github/actions/setup-node-pnpm

      - name: Run database migrations
        run: pnpm --filter api db:migrate

      - name: Run API e2e tests
        run: pnpm ci:e2e
